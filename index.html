<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>曾诗雅 | 跨境电商·外贸个人主页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #f0f7ff 0%, #e0f0ff 100%);
            color: #1E293B;
            line-height: 1.8;
            overflow-x: hidden;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            padding: 18px 0;
            text-align: center;
            z-index: 999;
            box-shadow: 0 2px 15px rgba(59,130,246,0.08);
            transition: 0.4s;
        }

        nav.scrolled {
            padding: 12px 0;
            background: rgba(255,255,255,0.98);
        }

        nav a {
            margin: 0 16px;
            text-decoration: none;
            color: #334155;
            font-size: 15px;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }

        nav a:hover {
            color: #3b82f6;
        }

        .hero {
            min-height: 100vh;
            padding: 100px 20px;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            border-radius: 0 0 50px 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            text-align: center;
        }

        /* 左侧英文 */
        .hero-left {
            font-size: 46px;
            font-weight: 700;
            background: linear-gradient(90deg, #1e293b, #475569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(-30px);
            animation: slideIn 1s ease-out forwards;
            animation-delay: 0.5s;
        }

        /* 中间：头像 + 信息 绝对居中 */
        .hero-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .avatar {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 8px 30px rgba(59,130,246,0.15);
            animation: float 3.5s infinite ease-in-out;
        }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50%  { transform: translateY(-10px); }
        }

        .hero-info h1 {
            font-size: 38px;
            background: linear-gradient(90deg, #1e3a8a, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .hero-info p {
            color: #475569;
            font-size: 16px;
        }

        /* 右侧：打字效果文字 延迟1秒后逐字出现 */
        .hero-right {
            font-size: 17px;
            font-weight: 500;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid #3b82f6;
            width: 0;
            animation: typing 6s steps(60, end) forwards;
            animation-delay: 1s;
        }

        @keyframes slideIn {
            to { opacity:1; transform:translateX(0); }
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section {
            margin-bottom: 50px;
        }

        .title {
            font-size: 24px;
            color: #1e3a8a;
            margin-bottom: 24px;
            padding-left: 16px;
            border-left: 4px solid #3b82f6;
            font-weight: 600;
        }

        .card {
            background: linear-gradient(135deg, #f8fcff 0%, #e6f4ff 100%);
            border-radius: 22px;
            padding: 32px;
            box-shadow: 0 8px 24px rgba(59,130,246,0.08);
        }

        .card ul {
            list-style: none;
        }

        .card li {
            margin-bottom: 8px;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            background: #f8fcff;
        }
    </style>
</head>

<body>

<nav>
    <a href="#home">首页</a>

    <a href="#skill">技能</a>

    <a href="#project">项目</a>
    <a href="#practice">实践</a>
    <a href="#cert">证书</a>
    <a href="#portfolio">作品</a>
</nav>

<section class="hero">
    <div class="hero-left">Hi, I'm Shiloh</div>

    <div class="hero-center">
        <img src="avatar.jpg" class="avatar" alt="头像">
        <div class="hero-info">
            <h1>曾诗雅</h1>
            <p>国际经济与贸易｜本科｜广州</p>
            <p>电话：16769902045｜邮箱：shiloh16769902045@163.com</p>
        </div>
    </div>

    <div class="hero-right">
        欢迎访问我的个人网页，在这里你可以看到我的教育背景、项目经验以及个人技能等个人信息，请接着往下看吧。
    </div>
</section>

<div class="container">
<section class="section" id="about">
    <h2 class="title">关于我</h2>
    <div class="card">
        <p>沉稳专注，细节把控力强，执行高效，具备扎实的国贸专业能力。</p>
        <p>热爱跨境电商与外贸实操，擅长新媒体运营、市场调研、单证制作，致力于成为全球化复合型外贸人才。</p>
    </div>
</section>
</div>

<footer>© 2026 曾诗雅 跨境电商外贸个人主页</footer>

</body>
</html>
