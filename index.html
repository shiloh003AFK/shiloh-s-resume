<script>
// 纯代码：水流漩涡 + 小鱼游动 不需要任何图片
const canvas=document.getElementById("waterCanvas");
const ctx=canvas.getContext("2d");
let w,h,time=0,fish=[];

function resize(){
w=canvas.width=innerWidth;
h=canvas.height=innerHeight;
initFish();
}

class Fish{
constructor(){this.reset();}
reset(){
this.x=Math.random()*w;
this.y=Math.random()*h;
this.speed=Math.random()*.6+.2;
this.ang=Math.random()*Math.PI*2;
this.size=Math.random()*4+2;
}
upd(){
this.ang+=.02*Math.sin(time*.4);
this.x+=Math.cos(this.ang)*this.speed;
this.y+=Math.sin(this.ang)*this.speed*.6;
if(this.x<0||this.x>w||this.y<0||this.y>h)this.reset();
}
draw(){
ctx.fillStyle="rgba(40,120,200,.35)";
ctx.beginPath();
ctx.ellipse(this.x,this.y,this.size,this.size*.5,this.ang,0,Math.PI*2);
ctx.fill();
}
}

function initFish(){fish=Array(20).fill().map(()=>new Fish());}

function waveBg(){
let g=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,w*.8);
g.addColorStop(0,"rgba(120,180,255,.2)");
g.addColorStop(1,"rgba(200,230,255,.1)");
ctx.fillStyle=g;
ctx.fillRect(0,0,w,h);
}

function animate(){
time+=.008;
ctx.clearRect(0,0,w,h);
waveBg();
fish.forEach(f=>{f.upd();f.draw();});
requestAnimationFrame(animate);
}

window.addEventListener("load",()=>{resize();animate();});
window.addEventListener("resize",resize);

//导航滚动
let nav=document.querySelector("nav");
window.onscroll=()=>{
nav.style.background=scrollY>50?"rgba(255,255,255,.96)":"rgba(255,255,255,.92)";
}
</script>
